        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="240" height="240" rx="48" fill="url(#capaiGrad)"/>
  <circle cx="120" cy="92" r="44" fill="none" stroke="#FFFFFF" stroke-width="6" opacity="0.95"/>
